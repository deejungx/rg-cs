services:
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-default}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./workspace:/app/workspace
    depends_on:
      - redis
      - qdrant
      - phoenix

  worker:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    command: uv run celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-default}
    volumes:
      - ./uploads:/app/uploads
      - ./workspace:/app/workspace
    depends_on:
      - redis
      - qdrant
      - phoenix

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"

volumes:
  qdrant_data:
